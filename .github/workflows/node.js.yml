name: Node.js CI (Optimized Puppeteer)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup Node.js with optimized caching
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
          
    - name: Install dependencies
      run: npm ci
      
    - name: Get Puppeteer version for cache key
      id: puppeteer-version
      run: |
        VERSION=$(node -e "console.log(require('./node_modules/puppeteer/package.json').version)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Multi-layer browser cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/puppeteer/
          ~/.cache/ms-playwright/
        key: ${{ runner.os }}-puppeteer-${{ steps.puppeteer-version.outputs.version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-puppeteer-${{ steps.puppeteer-version.outputs.version }}-
          ${{ runner.os }}-puppeteer-
      
    
    - name: Install minimal Chrome dependencies (cache miss only)
      run: |
        sudo apt-get update -qq > /dev/null
        sudo apt-get install -y --no-install-recommends \
          libnspr4 \
          libnss3 \
          libatk-bridge2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libxss1 \
          libasound2t64 \
          libgtk-3-0 > /dev/null 2>&1 || echo "Chrome dependencies installation failed"
      if: steps.cache.outputs.cache-hit != 'true'
      
    - name: Install Chrome browser via Puppeteer (cache miss only)
      run: |
        npx puppeteer browsers install chrome
      if: steps.cache.outputs.cache-hit != 'true'
      
    - name: Build (if needed)
      run: npm run build --if-present
      
    - name: Run tests with optimized settings
      env:
        CI: true
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
      run: npm test