name: Node.js CI (Optimized Playwright)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup Node.js with optimized caching
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
          
    - name: Install dependencies
      run: npm ci
      
    - name: Get Playwright version for cache key
      id: playwright-version
      run: |
        VERSION=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright/
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
          ${{ runner.os }}-playwright-
    
    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
      
    - name: Build (if needed)
      run: npm run build --if-present
      
    - name: Run tests with optimized settings
      env:
        CI: true
      run: npm test