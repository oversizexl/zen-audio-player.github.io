# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests using the official Puppeteer container

name: Node.js CI (with Puppeteer Container)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    container:
      image: ghcr.io/puppeteer/puppeteer:24
      options: --cap-add=SYS_ADMIN --init
      user: root
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install dependencies
      env:
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
        PUPPETEER_SKIP_DOWNLOAD: true
      run: |
        # Skip Puppeteer download since container has Chrome pre-installed
        npm ci --ignore-scripts || npm install --no-package-lock
      
    - name: Build (if needed)
      run: npm run build --if-present
      
    - name: Run tests with CI environment
      env:
        CI: true
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
        PUPPETEER_SKIP_DOWNLOAD: true
        PUPPETEER_SKIP_CHROMIUM_VERSION_CHECK: true
        PUPPETEER_CACHE_DIR: /home/pptruser/.cache/puppeteer
      run: npm test