name: Bun CI (Optimized Playwright)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
          
    - name: Install dependencies
      run: bun install
      
    - name: Get Playwright version for cache key
      id: playwright-version
      run: |
        VERSION=$(bun -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright/
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-
          ${{ runner.os }}-playwright-
    
    - name: Install Playwright browsers
      run: bunx playwright install chromium --with-deps
      
    - name: Build (if needed)
      run: if bun run | grep -q '^  build$'; then bun run build; else echo "No build script, skipping"; fi
      
    - name: Run tests with optimized settings
      env:
        CI: true
      run: bun run test