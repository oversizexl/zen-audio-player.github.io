    <script src="https://unpkg.com/jquery@4.0.0/dist/jquery.min.js"></script>
    <script src="https://unpkg.com/corejs-typeahead@1.3.4/dist/typeahead.jquery.min.js"></script>
    <script src="https://unpkg.com/urijs@1.19.11/src/URI.min.js"></script>
    <script src="https://unpkg.com/plyr@3.8.4/dist/plyr.polyfilled.min.js"></script>

<body>
    <header>
        <figure>
            <a href="/" title="Zen Audio Player" class="zen-logo">
                <img src="img/zen-audio-player-905.png" class="img-100" alt="Zen Audio Player logo">
            </a>
        </figure>

        <hgroup>
            <h1>Zen Audio Player</h1>
            <h2 class="color-grey">Listen to YouTube videos, without the distracting visuals.</h2>
            <h2 class="color-grey hide flash mobile-message"></h2>
        </hgroup>
    </header>
    <main>
        <form class="search-form">
            <div class="input-group">
                <input type="text" name="v" class="input-search search-input color-grey"
                    placeholder="Search, YouTube video ID, or URL">
                <span class="input-group-button">
                    <button class="btn btn-search search-submit">
                        <i class="fa fa-search"></i>
                    </button>
                </span>
            </div>
        </form>
        <div class="search-results">
            <h3>Search Results</h3>
            <ul></ul>
        </div>
        <div class="hide flash flash-warn warning-message"></div>
        <div class="hide flash flash-error error-message"></div>

        <div class="audio-player">
            <h3>
                <a class="plyr__cite plyr__cite--video video-title"></a>
            </h3>

            <div class="player-controls">
                <button class="btn toggle-player-btn">
                    Show Player
                </button>
                <button class="btn toggle-description-btn">
                    Show Description
                </button>
                <button class="btn toggle-autoplay-btn">
                    Autoplay
                </button>
                <button class="btn toggle-repeat-btn">
                    Repeat Track
                </button>
            </div>

            <div class="plyr-svg" hidden></div>
            <video class="plyr"></video>
            <br>
            <div class="video-description"></div>
            <br>
        </div>
        <button class="btn demo-button">
            <i class="fa fa-mouse-pointer"></i>
            Click for Demo
        </button>

        <div class="fav-panel">
            <br>
            <button class="btn focus-btn">
                <i class="fa fa-headphones"></i>
                Focus
            </button>
            <button class="btn lofi-btn">
                <i class="fa fa-headphones"></i>
                Lofi
            </button>
        </div>
    </main>
    <footer>
        <div class="tweet-button"></div>
        <script>!function (d, s, id) { var js, fjs = d.getElementsByTagName(s)[0], p = /^http:/.test(d.location) ? "http" : "https"; if (!d.getElementById(id)) { js = d.createElement(s); js.id = id; js.src = p + "://platform.twitter.com/widgets.js"; fjs.parentNode.insertBefore(js, fjs); } }(document, "script", "twitter-wjs");</script>
        <div class="color-grey">
            <p>Created by <a href="https://twitter.com/_Shakeel" target="_blank">@_Shakeel</a> and <a
                    href="https://github.com/zen-audio-player/zen-audio-player.github.io/graphs/contributors"
                    target="_blank">others.</a></p>
            <p><a href="https://chrome.google.com/webstore/detail/zen-youtube-audio-player/jlkomkpeedajclllhhfkloddbihmcjlm"
                    target="_blank">Get the Chrome extension</a> - (<a
                    href="https://github.com/zen-audio-player/extension-chrome" target="_blank">source</a>)</p>
        </div>
        <br>

        <h3>Sponsored by:</h3>
        <div class="sponsor">
            <a href="https://trackjs.com/" class="sponsor-a" target="_blank">
                <img src="img/trackjs_logo.png" alt="TrackJS Logo" class="img-40">
            </a>
            <div class="clear-both"></div>
        </div>

        <div class="repo-info">
            <br>
            <p>Source available on GitHub: <br><a href="https://github.com/zen-audio-player/zen-audio-player.github.io"
                    class="fa fa-github" target="_blank"></a></p>
        </div>
    </footer>

            "@context": "http://schema.org",

        }
    </script>
</body>
</html>
